        function getFase(kls) {
            const k = parseInt(kls);
            if (k <= 2) return 'A';
            if (k <= 4) return 'B';
            return 'C';
        }

        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        async function generateSoal() {
            let finalTP = state.mode === 'Kurmer' ? (state.tujuanPembelajaran === 'Lainnya' ? state.customTP : state.tujuanPembelajaran) : "";
            if (state.mode === 'Kurmer' && !finalTP.trim()) {
                alert("Silakan pilih atau isi Tujuan Pembelajaran.");
                return;
            }

            state.loading = true;
            state.result = null;
            state.error = '';
            render();

            const apiKey = ""; // API Key placeholder
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            let prompt = "";
            if (state.mode === 'Kurmer') {
                prompt = `Buat 1 soal instrumen evaluasi SD Kelas ${state.kelas}. Mapel: ${state.mapel}, TP: ${finalTP}, Materi: ${state.materiEsensial}, Taksonomi: ${state.taksonomi}, Jenis Soal: ${state.jenisSoal}. 
                WAJIB: Berikan STIMULUS positif dan edukatif. Jika Fase A (Kls 1-2), gunakan kalimat sederhana dan fokus pada nalar logis keseharian anak.`;
            } else {
                prompt = `Buat 1 soal TKA SD Bidang ${state.mapelTKA} Kelas ${state.kelas}. Domain: ${state.domainTKA}, Level Kognitif: ${state.kognitifTKA}, Matriks Kompetensi: ${state.topikTKA}, Jenis Soal: ${state.jenisSoal}. 
                WAJIB: Gunakan stimulus data/grafik/wacana valid sesuai standar Pusmendik Kemendikdasmen.`;
            }

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "Respon harus format JSON murni. Gunakan gaya bahasa Indonesia yang modern dan ramah murid SD. Tuntutan soal harus HOTS (Pembelajaran Mendalam)." }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            indikator_soal_otomatis: { type: "STRING" },
                            stimulus: { type: "STRING" },
                            pertanyaan: { type: "STRING" },
                            opsi_jawaban: { type: "ARRAY", items: { type: "STRING" } },
                            kunci_jawaban: { type: "STRING" },
                            pembahasan: { type: "STRING" }
                        },
                        required: ["indikator_soal_otomatis", "stimulus", "pertanyaan", "opsi_jawaban", "kunci_jawaban", "pembahasan"]
                    }
                }
            };

            try {
                const data = await fetchWithRetry(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const resText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (resText) {
                    state.result = {
                        ...JSON.parse(resText),
                        mode: state.mode,
                        mapel: state.mode === 'Kurmer' ? state.mapel : state.mapelTKA,
                        kelas: state.kelas,
                        author: state.identity,
                        topik: state.mode === 'Kurmer' ? finalTP : state.topikTKA,
                        jenis_soal_terpilih: state.jenisSoal
                    };
                }
            } catch (err) {
                state.error = 'Terjadi kesalahan koneksi AI. Silakan coba lagi.';
            } finally {
                state.loading = false;
                render();
            }
        }

                                <div class="p-2.5 bg-emerald-50/80 rounded-xl shadow-sm border border-emerald-100 group-hover:scale-110 transition-transform"><i data-lucide="lightbulb" class="w-5 h-5 text-emerald-600"></i></div>
                                <span class="font-bold text-slate-800 group-hover:text-emerald-800">Rangkuman HOTS & TKA</span>

            </div>

        }

        function renderHomeUpdate() {
            const isFormValid = state.identity.nama.trim() !== '' && state.identity.instansi.trim() !== '';
            const btn = document.getElementById('btn-start');
            if (isFormValid) {
                btn.disabled = false;
                btn.classList.remove('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
                btn.classList.add('bg-blue-900', 'hover:bg-blue-800', 'text-white', 'shadow-blue-900/30');
                btn.querySelector('i').classList.add('text-amber-400');
            } else {
                btn.disabled = true;
                btn.classList.add('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
                btn.classList.remove('bg-blue-900', 'hover:bg-blue-800', 'text-white', 'shadow-blue-900/30');
                btn.querySelector('i').classList.remove('text-amber-400');
            }
        }

        function renderGenerator() {
            const fase = getFase(state.kelas);
            const subjects = ['Matematika', 'Bahasa Indonesia', 'Pendidikan Pancasila', 'IPAS', 'Bahasa Inggris', 'Koding & AI', 'Seni Musik', 'Seni Rupa', 'Seni Tari', 'Seni Teater', 'PJOK'];
            const tps = TP_DATA[state.mapel]?.[fase] || [];
            
            return `
            <div class="min-h-screen bg-slate-50 py-10 px-4 sm:px-6 lg:px-8 font-edutech text-slate-800 animate-fade-in">
                <div class="max-w-7xl mx-auto space-y-8">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 pb-2 border-b border-slate-200 no-print">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-white rounded-2xl shadow-sm border border-slate-200"><i data-lucide="brain" class="w-8 h-8 text-blue-900"></i></div>
                            <div>
                                <h1 class="text-2xl md:text-3xl font-extrabold text-blue-950 tracking-tight">Generator Pembelajaran Mendalam</h1>
                                <p class="text-slate-500 font-medium">Asisten: ${state.identity.nama} | ${state.identity.instansi}</p>
                            </div>
                        </div>
                        <button onclick="navigate('home')" class="inline-flex items-center gap-2 text-slate-500 hover:text-blue-900 font-bold px-4 py-2 bg-white rounded-xl border border-slate-200 shadow-sm transition-all"><i data-lucide="arrow-left" class="w-5 h-5"></i> Kembali</button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
                        <div class="lg:col-span-4 space-y-6 no-print">
                            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1.5 bg-blue-900"></div>
                                <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-8 border border-slate-200">
                                    <button onclick="setMode('Kurmer')" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all ${state.mode === 'Kurmer' ? 'bg-white text-blue-900 shadow-sm' : 'text-slate-500'}">Kurikulum Merdeka</button>
                                    <button onclick="setMode('TKA')" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all ${state.mode === 'TKA' ? 'bg-white text-blue-900 shadow-sm' : 'text-slate-500'}">Asesmen TKA</button>
                                </div>

                                <form onsubmit="event.preventDefault(); generateSoal();" class="space-y-6">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div><label class="text-xs font-bold text-slate-500 uppercase mb-2 block tracking-wider">Kelas</label>
                                            <select onchange="state.kelas = this.value; updateTPs();" class="w-full rounded-2xl border-slate-200 border-2 p-3 bg-slate-50 font-bold text-slate-800">
                                                ${state.mode === 'Kurmer' ? [1,2,3,4,5,6].map(k => `<option value="${k}" ${state.kelas == k ? 'selected' : ''}>Kelas ${k}</option>`).join('') : [5,6].map(k => `<option value="${k}" ${state.kelas == k ? 'selected' : ''}>Kelas ${k}</option>`).join('')}
                                            </select>
                                        </div>
                                        <div><label class="text-xs font-bold text-slate-500 uppercase mb-2 block tracking-wider">Jenis Soal</label>
                                            <select onchange="state.jenisSoal = this.value;" class="w-full rounded-2xl border-slate-200 border-2 p-3 bg-slate-50 font-bold text-slate-800">
                                                <option value="Pilihan Ganda">Pilihan Ganda</option>
                                                <option value="Pilihan Ganda Kompleks">PG Kompleks</option>
                                                <option value="Benar Salah beserta alasan">Benar/Salah</option>
                                                <option value="Isian">Isian</option>
                                                <option value="Uraian">Uraian</option>
                                            </select>
                                        </div>
                                    </div>

                                    ${state.mode === 'Kurmer' ? renderKurmerForm(subjects, tps) : renderTKAForm()}

                                    <button id="btn-generate" ${state.loading ? 'disabled' : ''} type="submit" class="w-full mt-4 bg-blue-900 hover:bg-blue-950 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-95 text-lg shadow-xl shadow-blue-900/20">
                                        ${state.loading ? '<i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i> Meracik...' : '<i data-lucide="sparkles" class="w-6 h-6 text-amber-400"></i> Buat Instrumen Soal'}
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div class="lg:col-span-8 flex flex-col h-full print-area">
                            ${state.result ? renderResult() : renderEmptyState()}
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        function renderKurmerForm(subjects, tps) {
            return `
            <div><label class="text-xs font-bold text-slate-500 uppercase mb-2 block tracking-wider">Mata Pelajaran</label>
                <select onchange="state.mapel = this.value; updateTPs();" class="w-full rounded-2xl border-slate-200 border-2 p-3 bg-slate-50 font-bold text-slate-800">
                    ${subjects.map(s => `<option value="${s}" ${state.mapel === s ? 'selected' : ''}>${s}</option>`).join('')}
                </select>
            </div>
            <div class="p-5 bg-slate-50 rounded-2xl border-2 border-slate-100 space-y-4 shadow-inner">
                <div><label class="text-xs font-bold text-blue-900 uppercase mb-2 block">Tujuan Pembelajaran (TP)</label>
                    <select onchange="state.tujuanPembelajaran = this.value; render();" class="w-full rounded-2xl border p-3 bg-white text-sm shadow-sm">
                        ${tps.map(tp => `<option value="${tp}" ${state.tujuanPembelajaran === tp ? 'selected' : ''}>${tp.length > 50 ? tp.substring(0, 50) + '...' : tp}</option>`).join('')}

                    </select>
                    ${state.tujuanPembelajaran === 'Lainnya' ? `<textarea oninput="state.customTP = this.value" placeholder="Isi TP manual secara spesifik..." class="w-full mt-2 rounded-2xl border-blue-300 border-2 p-3 text-sm focus:ring-0">${state.customTP}</textarea>` : ''}
                </div>
                <div><label class="text-xs font-bold text-amber-600 uppercase mb-2 block">Materi Esensial (Opsional)</label>
                    <input oninput="state.materiEsensial = this.value" placeholder="Cth: Ekosistem Laut" class="w-full rounded-2xl border p-3 bg-white text-sm" value="${state.materiEsensial}" />
                </div>
            </div>
            <div><label class="text-xs font-bold text-slate-500 uppercase mb-2 block tracking-wider">Taksonomi</label>
                <select onchange="state.taksonomi = this.value" class="w-full rounded-2xl border-slate-200 border-2 p-3 bg-slate-50 font-bold text-slate-800">
                    <optgroup label="Bloom">
                        <option value="Bloom - Mengingat (C1)">C1 - Mengingat</option>
                        <option value="Bloom - Memahami (C2)">C2 - Memahami</option>
                        <option value="Bloom - Menerapkan (C3)">C3 - Menerapkan</option>
                        <option value="Bloom - Menganalisis (C4) / HOTS" selected>C4 - Menganalisis</option>
                        <option value="Bloom - Mengevaluasi (C5) / HOTS">C5 - Mengevaluasi</option>
                        <option value="Bloom - Mengkreasi (C6) / HOTS">C6 - Mengkreasi</option>
                    </optgroup>
                    <optgroup label="SOLO">
                        <option value="SOLO - Pre-structural">Pre-structural</option>
                        <option value="SOLO - Uni-structural">Uni-structural</option>
                        <option value="SOLO - Multi-structural">Multi-structural</option>
                        <option value="SOLO - Relational">Relational</option>
                        <option value="SOLO - Extended Abstract">Extended Abstract</option>
                    </optgroup>
                </select>
            </div>
            `;
        }

        function renderTKAForm() {
            return `
            <div><label class="text-xs font-bold text-slate-500 uppercase mb-2 block tracking-wider">Bidang TKA</label>
                <select onchange="state.mapelTKA = this.value; render();" class="w-full rounded-2xl border-indigo-200 border-2 p-3 bg-indigo-50 font-bold text-indigo-950">
                    <option value="Matematika" ${state.mapelTKA === 'Matematika' ? 'selected' : ''}>Matematika</option>
                    <option value="Bahasa Indonesia" ${state.mapelTKA === 'Bahasa Indonesia' ? 'selected' : ''}>Bahasa Indonesia</option>
                </select>
            </div>
            <div class="p-5 bg-slate-50 rounded-2xl border-2 border-slate-100 space-y-4 shadow-inner">
                <div><label class="text-xs font-bold text-slate-600 block mb-2">Matriks Kompetensi</label>
                    <select onchange="state.topikTKA = this.value" class="w-full rounded-2xl border p-3 text-sm bg-white shadow-sm">
                        ${TKA_MATRIKS_TOPIK[state.mapelTKA].map(t => `<option value="${t}" ${state.topikTKA === t ? 'selected' : ''}>${t.length > 50 ? t.substring(0, 50) + '...' : t}</option>`).join('')}
                    </select>
                </div>
                <div><label class="text-xs font-bold text-slate-600 block mb-2">Level Kognitif</label>
                    <select onchange="state.kognitifTKA = this.value" class="w-full rounded-2xl border p-3 text-sm bg-white shadow-sm">
                        ${TKA_KOGNITIF[state.mapelTKA].map(k => `<option value="${k}" ${state.kognitifTKA === k ? 'selected' : ''}>${k}</option>`).join('')}
                    </select>
                </div>
            </div>
            `;
        }

        function renderResult() {
            const res = state.result;
            return `
            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full animate-fade-in">
                <div class="bg-white border-b-2 border-slate-100 p-8 sm:p-10">
                    <div class="flex flex-wrap gap-4 justify-between items-start mb-8">
                        <div class="space-y-1">
                            <h2 class="text-2xl font-black text-blue-950 uppercase tracking-tight">INSTRUMEN EVALUASI MURID</h2>
                            <p class="text-slate-500 font-bold flex items-center gap-2 tracking-wide"><i data-lucide="user" class="w-4 h-4"></i> ${res.author.nama} | ${res.author.instansi}</p>
                        </div>
                        <button onclick="window.print()" class="no-print inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-2xl transition-all shadow-md active:scale-95">
                            <i data-lucide="printer" class="w-5 h-5"></i> Unduh PDF / Cetak
                        </button>

                    <div class="grid grid-cols-2 gap-8">

                        <div><p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">Kelas Asesmen</p><p class="font-bold text-slate-800 text-lg uppercase">Kelas ${res.kelas} SD (${res.mode === 'Kurmer' ? 'Kurikulum Merdeka' : 'TKA'})</p></div>
                        <div class="col-span-2"><p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">Target Kompetensi / TP</p><p class="font-bold text-slate-700 text-sm leading-relaxed italic border-l-4 border-slate-200 pl-4">"${res.topik}"</p></div>
                    </div>
                </div>

                <div class="p-8 sm:p-12 space-y-10 flex-grow bg-white">
                    <div class="bg-slate-50 p-8 rounded-3xl border-2 border-slate-100 relative shadow-inner">
                        <div class="absolute -top-4 left-8 bg-white px-4 py-1 rounded-full text-xs font-black border-2 border-slate-100 text-slate-500 flex items-center gap-2">
                            <i data-lucide="file-text" class="w-4 h-4"></i> STIMULUS & WACANA
                        </div>
                        <p class="text-slate-900 leading-relaxed text-lg font-medium whitespace-pre-wrap">${res.stimulus}</p>
                    </div>
                    <div class="space-y-6">
                        <div class="font-black text-slate-950 text-xl md:text-2xl leading-tight pl-2 border-l-4 border-blue-900">${res.pertanyaan}</div>
                        ${res.opsi_jawaban && res.opsi_jawaban.length > 0 ? `
                            <div class="grid gap-4">
                                ${res.opsi_jawaban.map((o, i) => `
                                    <div class="flex items-start gap-4 p-5 rounded-2xl border-2 border-slate-100 font-bold text-slate-800 shadow-sm bg-white">
                                        <span class="w-8 h-8 flex items-center justify-center bg-blue-50 text-blue-900 rounded-full shrink-0">${['A','B','C','D'][i]}</span>
                                        <span class="pt-0.5">${o}</span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : `<div class="w-full min-h-[160px] border-4 border-dashed border-slate-200 rounded-3xl p-8 flex items-center justify-center"><p class="text-slate-300 font-black uppercase tracking-widest">Kolom Jawaban Siswa</p></div>`}
                    </div>
                </div>

                <div class="no-print border-t-2 border-slate-100 bg-slate-50 mt-auto">
                    <details class="group">
                        <summary class="w-full p-8 flex items-center justify-between font-black text-blue-900 cursor-pointer list-none hover:bg-slate-100 transition-colors">
                            <span class="flex items-center gap-3"><i data-lucide="brain" class="w-6 h-6"></i> KUNCI JAWABAN & TELAHAAN PEDAGOGIS</span>
                            <i data-lucide="chevron-down" class="w-6 h-6 transition group-open:rotate-180 text-slate-400"></i>
                        </summary>
                        <div class="p-8 bg-white border-t-2 border-slate-100 space-y-8 font-medium">
                            <div class="p-6 bg-emerald-50 border-2 border-emerald-100 rounded-3xl">
                                <p class="text-[10px] font-black text-emerald-600 uppercase mb-2 tracking-widest">Solusi Benar</p>
                                <p class="font-black text-emerald-950 text-xl">${res.kunci_jawaban}</p>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-blue-900 uppercase mb-4 tracking-widest">Analisis Pembelajaran Mendalam (HOTS)</p>
                                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-200 leading-relaxed text-slate-700">${res.pembahasan}</div>
                            </div>
                        </div>
                    </details>
                </div>
            </div>
            `;
        }

        function renderEmptyState() {
            return `
            <div class="h-full min-h-[500px] bg-white rounded-[3rem] border-2 border-slate-200 border-dashed flex flex-col items-center justify-center text-slate-400 p-10 text-center">
                <i data-lucide="target" class="w-16 h-16 mb-6 text-slate-200"></i>
                <h3 class="text-2xl font-bold text-slate-800 mb-2">Pratinjau Instrumen</h3>
                <p class="max-w-xs font-medium">Selesaikan konfigurasi di samping untuk memproduksi soal berbasis Pembelajaran Mendalam.</p>
            </div>
            `;
        }

        // --- UTILITY FUNCTIONS ---

        window.navigate = (view) => {
            state.view = view;
            render();
        };

        window.setMode = (mode) => {
            state.mode = mode;
            state.result = null;
            if (mode === 'TKA') state.kelas = '5';
            updateTPs();
            render();
        };

        window.updateTPs = () => {
            const fase = getFase(state.kelas);
            const list = TP_DATA[state.mapel]?.[fase] || [];
            state.tujuanPembelajaran = list.length > 0 ? list[0] : 'Lainnya';
            state.topikTKA = TKA_MATRIKS_TOPIK[state.mapelTKA][0];
            state.kognitifTKA = TKA_KOGNITIF[state.mapelTKA][0];
            render();
        };

        window.toggleModal = (type) => {
            const container = document.getElementById('modal-container');
            if (!type) {
                container.classList.add('hidden');
                return;
            }

            let title = '', icon = '', colorClass = '', content = '';
            
            if (type === 'panduan') {
                title = 'Panduan Penggunaan'; icon = 'file-text'; colorClass = 'bg-blue-100 text-blue-800';
                content = `
                <ul class="space-y-8 font-medium">
                    <li class="flex items-start gap-5"><div class="flex-shrink-0 w-12 h-12 bg-blue-50 text-blue-800 font-bold rounded-full flex items-center justify-center border-2 border-blue-200 text-xl shadow-sm">1</div><div class="pt-1"><h3 class="font-bold text-blue-950 text-xl">Lengkapi Profil</h3><p class="text-slate-500 mt-2 leading-relaxed text-base">Isi nama dan instansi Anda di halaman beranda agar identitas Anda tercetak otomatis pada lembar soal.</p></div></li>
                    <li class="flex items-start gap-5"><div class="flex-shrink-0 w-12 h-12 bg-blue-50 text-blue-800 font-bold rounded-full flex items-center justify-center border-2 border-blue-200 text-xl shadow-sm">2</div><div class="pt-1"><h3 class="font-bold text-blue-950 text-xl">Pilih Mode & Cabang</h3><p class="text-slate-500 mt-2 leading-relaxed text-base">Gunakan Kurikulum Merdeka untuk semua kelas atau Mode TKA untuk evaluasi standar nasional kelas 5-6.</p></div></li>
                    <li class="flex items-start gap-5"><div class="flex-shrink-0 w-12 h-12 bg-blue-50 text-blue-800 font-bold rounded-full flex items-center justify-center border-2 border-blue-200 text-xl shadow-sm">3</div><div class="pt-1"><h3 class="font-bold text-blue-950 text-xl">Hasil & Cetak PDF</h3><p class="text-slate-500 mt-2 leading-relaxed text-base">Setelah soal diracik AI, klik tombol <strong>"Unduh PDF / Cetak"</strong> untuk menyimpan instrumen.</p></div></li>
                </ul>`;
            } else {
                title = 'Rangkuman HOTS & TKA'; icon = 'lightbulb'; colorClass = 'bg-emerald-100 text-emerald-800';
                content = `
                <div class="space-y-6 font-medium text-slate-700 leading-relaxed">
                    <p><strong class="text-blue-950">HOTS</strong> berfokus pada kemampuan menganalisis, mengevaluasi, dan mencipta dengan stimulus yang kontekstual.</p>
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100"><h4 class="font-bold text-blue-900 mb-2">Bloom (C1-C6)</h4><ul class="text-sm space-y-1"><li>C4: Menganalisis</li><li>C5: Mengevaluasi</li><li>C6: Mengkreasi</li></ul></div>
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100"><h4 class="font-bold text-emerald-900 mb-2">Taksonomi SOLO</h4><ul class="text-sm space-y-1"><li>Relational: Hubungan Konsep</li><li>Extended Abstract: Generalisasi</li></ul></div>
                    </div>
                    <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100"><h4 class="font-bold text-blue-950 mb-2">TKA (Tes Kemampuan Akademik)</h4><p class="text-sm">Asesmen nasional kelas 5-6 pada domain Bahasa Indonesia dan Matematika dengan matriks kompetensi Pusmendik.</p></div>
                </div>`;
            }

            container.innerHTML = `
            <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-fade-in">
                <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-100 flex flex-col">
                    <div class="flex items-center justify-between p-6 border-b border-slate-100 sticky top-0 bg-white/95 backdrop-blur z-10">
                        <div class="flex items-center gap-4">
                            <div class="p-3 rounded-2xl ${colorClass}"><i data-lucide="${icon}" class="w-6 h-6"></i></div>
                            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">${title}</h2>
                        </div>
                        <button onclick="toggleModal(null)" class="p-2 text-slate-400 hover:bg-slate-100 rounded-full transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
                    </div>
                    <div class="p-6 sm:p-8">${content}</div>
                </div>
            </div>
            `;
            container.classList.remove('hidden');
            lucide.createIcons();
        }

        // --- INITIALIZE ---
        window.onload = () => {
            updateTPs();
            render();
        };
    </script>
</body>
</html>
