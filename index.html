        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

                prompt = `Buat 1 soal instrumen evaluasi SD Kelas ${state.kelas}. Mapel: ${state.mapel}, TP: ${finalTP}, Materi: ${state.materiEsensial}, Level Kognitif: ${state.taksonomi}, Jenis Soal: ${state.jenisSoal}. 
                ${pemahamanKognitif}
                ${aturanPembuatan}
                ${aturanKhususKelas}`;
            } else {
                prompt = `Buat 1 soal TKA SD Bidang ${state.mapelTKA} Kelas ${state.kelas}. Kognitif: ${state.kognitifTKA}, Matriks Kompetensi: ${state.topikTKA}, Jenis Soal: ${state.jenisSoal}. 
                ${pemahamanKognitif}
                ${aturanPembuatan}
                ${aturanKhususKelas}`;
            }

            try {
                const data = await fetchWithRetry(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                if (data && data.success) {
                    let cleanText = data.data.replace(/```json/g, '').replace(/```/g, '').trim();
                    state.result = {
                        ...JSON.parse(cleanText),
                        mode: state.mode,
                        mapel: state.mode === 'Kurmer' ? state.mapel : state.mapelTKA,
                        kelas: state.kelas,
                        author: state.identity,
                        topik: state.mode === 'Kurmer' ? finalTP : state.topikTKA,
                        jenis_soal_terpilih: state.jenisSoal,
                        level_kognitif_dipilih: taksonomiTerpilih
                    };
                } else {
                    throw new Error(data && data.error ? data.error : "Respon AI kosong.");
                }
            } catch (err) {
                state.error = "Gagal meracik soal. Pastikan URL Apps Script sudah benar atau server mungkin sedang sibuk. Silakan coba lagi.";
            } finally {
                state.loading = false;
                render();
                setTimeout(() => {
                    const el = document.getElementById('result-target');
                    if(el && !state.error) {
                        const y = el.getBoundingClientRect().top + window.pageYOffset - 20;
                        window.scrollTo({top: y, behavior: 'smooth'});
                    }
                }, 300);
            }
        }

                        </div>
                        
                        <div class="flex flex-col sm:flex-row gap-2 w-full lg:w-auto">
                            <button type="button" onclick="copyToClipboard()" class="no-print w-full sm:w-auto inline-flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-5 rounded-xl transition-all active:scale-95 text-sm shadow-md">
                                <i data-lucide="copy" class="w-4 h-4"></i> Salin Teks Soal
                            </button>
                            <button type="button" onclick="window.print()" class="no-print w-full sm:w-auto inline-flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-5 rounded-xl transition-all active:scale-95 text-sm shadow-md">
                                <i data-lucide="printer" class="w-4 h-4"></i> Cetak / PDF
                            </button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs sm:text-sm w-full">
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <p class="text-[9px] text-slate-400 font-black uppercase mb-1">Mata Pelajaran</p>
                            <p class="font-bold text-blue-900 uppercase">${res.mapel}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex flex-col">
                            <p class="text-[9px] text-slate-400 font-black uppercase mb-1">Sasaran & Level Kognitif</p>
                            <div class="flex items-center justify-between gap-2 mt-auto">
                                <p class="font-bold text-slate-800 uppercase">Kelas ${res.kelas} SD (${res.mode === 'Kurmer' ? 'Asesmen Reguler' : 'TKA'})</p>
                                <span class="px-2 py-0.5 rounded-md font-extrabold text-[10px] border ${levelColor}">${levelLabel}</span>
                            </div>
                        </div>
                        
                        <div class="sm:col-span-2 bg-slate-50 p-4 rounded-xl border border-slate-100 w-full">
                            <p class="text-[9px] text-slate-400 font-black uppercase mb-1">Target Kompetensi / Tujuan Pembelajaran</p>
                            <p class="font-bold text-slate-700 leading-relaxed italic border-l-3 border-slate-300 pl-3">"${res.topik}"</p>
                        </div>
                        
                        <!-- INDIKATOR SOAL -->
                        <div class="sm:col-span-2 bg-blue-50/60 p-5 rounded-xl border-2 border-blue-200 shadow-sm mt-1 w-full">
                            <p class="text-[10px] text-blue-800 font-black uppercase mb-2 flex items-center gap-1.5"><i data-lucide="target" class="w-4 h-4"></i> Rumusan Indikator Soal</p>
                            <p class="font-bold text-blue-950 text-sm sm:text-base leading-relaxed">${indikatorText}</p>
                        </div>
                    </div>
                </div>

                <div class="p-6 sm:p-10 space-y-8 flex-grow bg-white w-full">
                    <div class="bg-slate-50 p-5 sm:p-8 rounded-2xl border border-slate-100 relative shadow-inner">
                        <div class="absolute -top-3 left-6 bg-white px-3 py-0.5 rounded-full text-[10px] font-black border border-slate-100 text-slate-500 flex items-center gap-1.5"><i data-lucide="file-text" class="w-3 h-3"></i> STIMULUS</div>
                        <p class="text-slate-900 leading-relaxed text-sm sm:text-lg font-medium whitespace-pre-wrap">${res.stimulus}</p>
                    </div>
                    <div class="space-y-5 w-full">
                        <div class="font-black text-slate-950 text-base sm:text-xl leading-tight pl-3 border-l-4 border-blue-900 break-words">${res.pertanyaan}</div>
                        ${opsiHtml}
                    </div>
                </div>

                <div class="no-print border-t border-slate-200 bg-slate-50 mt-auto w-full">
                    <details class="group w-full">
                        <summary class="w-full p-6 sm:p-8 flex items-center justify-between font-black text-blue-900 cursor-pointer list-none hover:bg-slate-100 transition-colors text-sm sm:text-base outline-none">
                            <span class="flex items-center gap-3"><i data-lucide="brain" class="w-5 h-5"></i> KUNCI & ANALISIS PEDAGOGIS</span>
                            <i data-lucide="chevron-down" class="w-5 h-5 transition-transform group-open:rotate-180 text-slate-400"></i>
                        </summary>
                        <div class="p-6 sm:p-8 bg-white border-t border-slate-100 space-y-6 font-medium w-full">
                            <div class="p-5 bg-emerald-50 border border-emerald-100 rounded-2xl w-full">
                                <p class="text-[9px] font-black text-emerald-600 uppercase mb-1 tracking-widest">Solusi Benar</p>
                                <p class="font-black text-emerald-950 text-base sm:text-xl break-words">${res.kunci_jawaban}</p>
                            </div>
                            <div class="w-full">
                                <p class="text-[9px] font-black text-blue-900 uppercase mb-3 tracking-widest">Analisis Pembelajaran</p>
                                <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 text-xs sm:text-sm text-slate-700 leading-relaxed break-words">${res.pembahasan}</div>
                            </div>
                        </div>
                    </details>
                </div>
            </div>
            `;
        }

        function renderEmptyState() {
            return `
            <div class="h-full min-h-[300px] sm:min-h-[500px] glass-card rounded-2xl sm:rounded-[3rem] border-2 border-white/60 border-dashed flex flex-col items-center justify-center text-slate-500 p-8 text-center w-full">
                <i data-lucide="target" class="w-12 h-12 sm:w-16 sm:h-16 mb-6 text-blue-200"></i>
                <h3 class="text-xl sm:text-2xl font-bold text-blue-950 mb-2">Pratinjau Instrumen</h3>
                <p class="max-w-xs font-medium text-xs sm:text-base text-slate-600">Selesaikan konfigurasi di samping untuk memproduksi soal.</p>
            </div>
            `;
        }

        function renderErrorState() {
            return `
            <div class="h-full min-h-[300px] sm:min-h-[500px] glass-card rounded-2xl sm:rounded-[3rem] border-2 border-red-200 border-dashed flex flex-col items-center justify-center text-red-500 p-8 text-center w-full animate-fade-in">
                <i data-lucide="alert-circle" class="w-12 h-12 sm:w-16 sm:h-16 mb-6 text-red-400"></i>
                <h3 class="text-xl sm:text-2xl font-bold text-red-900 mb-2">Terjadi Kesalahan</h3>
                <p class="max-w-xs font-medium text-xs sm:text-base text-red-700">${state.error}</p>
                <button type="button" onclick="generateSoal(event)" class="mt-6 px-6 py-2.5 bg-red-100 text-red-800 rounded-xl font-bold hover:bg-red-200 transition text-sm">Coba Lagi</button>
            </div>
            `;
        }

        window.toggleModal = (type) => {
            const container = document.getElementById('modal-container');
            if (!type) { container.classList.add('hidden'); return; }
            
            let title, content, icon, color;
            if(type === 'panduan'){
                title = 'Panduan Penggunaan'; icon = 'file-text'; color='bg-blue-100 text-blue-800';
                content = `
                <ul class="space-y-6 text-sm sm:text-base font-medium text-slate-700">
                    <li class="flex items-start gap-4">
                        <span class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 text-blue-800 flex items-center justify-center font-bold">1</span>
                        <span><strong class="text-blue-950">Lengkapi Profil Pengampu:</strong> Masukkan nama dan instansi agar otomatis tercetak di bagian atas (kop) instrumen evaluasi.</span>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 text-blue-800 flex items-center justify-center font-bold">2</span>
                        <span><strong class="text-blue-950">Pilih Mode Asesmen:</strong> Gunakan <i>Asesmen Reguler</i> (berbasis TP Kurmer) atau <i>Asesmen TKA</i> (berbasis matriks kompetensi Pusmendik).</span>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 text-blue-800 flex items-center justify-center font-bold">3</span>
                        <span><strong class="text-blue-950">Atur Konfigurasi:</strong> Tentukan Kelas, Jenis Soal, dan Target TP/Matriks. Pilih tingkat taksonomi kognitif sesuai kebutuhan belajar (LOTS/HOTS).</span>
                    </li>
                    <li class="flex items-start gap-4">
                        <span class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 text-blue-800 flex items-center justify-center font-bold">4</span>
                        <span><strong class="text-blue-950">Salin / Cetak PDF:</strong> Setelah pratinjau soal muncul, klik Salin Teks Soal untuk dipindah ke Word/Docs, atau klik tombol Cetak/Simpan PDF untuk mengunduh lembar soal bersih tanpa tombol konfigurasi.</span>
                    </li>
                </ul>`;
            } else {
                title = 'Memahami HOTS & LOTS'; icon = 'lightbulb'; color='bg-emerald-100 text-emerald-800';
                content = `
                <div class="space-y-5 text-sm sm:text-base font-medium text-slate-700">
                    <p><strong class="text-emerald-700">LOTS (Low Order)</strong> berfokus pada hafalan (C1), pemahaman dasar (C2), atau penerapan rumus/konsep di konteks yang sudah dikenal/rutin (C3).</p>
                    <p><strong class="text-amber-600">HOTS (High Order)</strong> BUKAN sekadar soal dengan angka besar, melainkan soal yang menuntut proses <strong>Penalaran (Level 3)</strong>. Anak harus mentransfer pengetahuan ke konteks kehidupan nyata yang baru secara analisis (C4), evaluasi (C5), atau kreasi (C6).</p>
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <p class="mb-2"><strong class="text-blue-950">Rumusan Indikator Soal:</strong><br>
                        Syarat indikator HOTS adalah adanya stimulus, konteks baru, dan KKO tingkat tinggi.</p>
                        <p class="italic text-slate-600 text-sm">Format: "Disajikan permasalahan sehari-hari yang berkaitan dengan keliling bangun datar, murid dapat menentukan ukuran bangun tersebut sesuai syarat tertentu."</p>
                    </div>
                </div>`;
            }

            container.innerHTML = `
            <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in w-full">
                <div class="bg-white rounded-3xl w-full max-w-lg max-h-[85vh] overflow-y-auto shadow-2xl border border-slate-100">
                    <div class="flex items-center justify-between p-5 border-b sticky top-0 bg-white/95 backdrop-blur z-10 w-full">
                        <div class="flex items-center gap-3"><div class="p-2 rounded-xl ${color} shrink-0"><i data-lucide="${icon}" class="w-5 h-5"></i></div><h2 class="font-bold text-lg text-slate-800">${title}</h2></div>
                        <button onclick="toggleModal(null)" class="p-1.5 text-slate-400 hover:bg-slate-100 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div class="p-6 w-full">${content}</div>
                </div>
            </div>`;
            container.classList.remove('hidden');
            lucide.createIcons();
        };

        // --- INITIALIZE ---
        window.onload = () => {
            updateTPs();
            render();
        };
    </script>
</body>
</html>
